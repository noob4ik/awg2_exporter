global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "awg-exporter"
    static_configs:
      # Замени VPN_SERVER_IP на реальный IP вашего VPN-сервера
      - targets: ["VPN_SERVER_IP:9586"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "vpn-server"
